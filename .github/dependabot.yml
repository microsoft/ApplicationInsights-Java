version: 2
registries:
  gradle-plugin-portal:
    type: maven-repository
    url: https://plugins.gradle.org/m2
    username: "" # Required by dependabot
    password: "" # Required by dependabot
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "gradle"
    directory: "/"
    registries:
      - gradle-plugin-portal
    ignore:
      - dependency-name: "ch.qos.logback:*"
        # logback 1.4+ requires Java 11+
        versions: [ "[1.4,)" ]
      - dependency-name: "org.springframework.boot:spring-boot-gradle-plugin"
        # this is used for smoke tests
        # spring boot 3 requires Java 17, and we're not ready yet
        versions: [ "[3,)" ]
      - dependency-name: "javax.servlet:javax.servlet-api"
        # applicationinsights-web (classic sdk) is intentionally compiled and against Servlet 3.0
        versions: [ "[3.1,)" ]
      - dependency-name: "org.eclipse.jetty:jetty-servlet"
        # smoke test framework intentionally uses javax servlet (as opposed to jakarta servlet)
        versions: [ "[11,)" ]
      - dependency-name: "org.mockito:*"
        # mockito 5 requires Java 11
        versions: [ "[5,)" ]
      - dependency-name: "org.junit:junit-bom"
        # junit 6 requires Java 17
        versions: [ "[6,)" ]
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      testcontainers:
        patterns:
          - "org.testcontainers:*"

      opentelemetry:
        patterns:
          - "otelSdkVersion"
          - "otelInstrumentationVersion"
          - "otelInstrumentationAlphaVersion"
          - "otelContribVersion"
          - "io.opentelemetry:opentelemetry-bom"
          - "io.opentelemetry:opentelemetry-bom-alpha"
          - "io.opentelemetry.instrumentation:opentelemetry-instrumentation-bom"
          - "io.opentelemetry.instrumentation:opentelemetry-instrumentation-bom-alpha"
          - "io.opentelemetry.instrumentation:opentelemetry-instrumentation-api-incubator"
          - "io.opentelemetry.instrumentation:gradle-plugins"

      opentelemetry-semconv:
        patterns:
          - "io.opentelemetry.semconv:opentelemetry-semconv"
          - "io.opentelemetry.semconv:opentelemetry-semconv-incubating"

      # Spotless repeatedly appears as two separate dependency names for the same version bump
      spotless:
        patterns:
          - "com.diffplug.spotless"
          - "com.diffplug.spotless:*"

  - package-ecosystem: "gradle"
    directory: "/perf-tests"
    registries:
      - gradle-plugin-portal
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "gradle"
    directory: "/etw/etw-testapp"
    registries:
      - gradle-plugin-portal
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
